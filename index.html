<!DOCTYPE html>

<html>
<head>
<title>Happy Birthday!</title>
<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff6b6b,#feca57);
    font-family:Arial,sans-serif;
    text-align:center;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
font-size:60px;
margin:10px;
}

p{
font-size:24px;
max-width:700px;
}

.cake{
font-size:120px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.balloon{
position:absolute;
font-size:40px;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-120px);}
} </style>

</head>

<body>

<div class="balloon" style="left:10%;">🎈</div>
<div class="balloon" style="left:30%; animation-delay:2s;">🎈</div>
<div class="balloon" style="left:50%; animation-delay:4s;">🎈</div>
<div class="balloon" style="left:70%; animation-delay:1s;">🎈</div>
<div class="balloon" style="left:90%; animation-delay:3s;">🎈</div>

<div class="cake">🎂</div>

<h1>Happy Birthday!</h1>

<p>
Wishing you happiness, success, good health,
and countless beautiful memories.
May all your dreams come true! 🎉
</p>

<h2>Have an amazing year ahead ❤️</h2>

</body>
</html>
