<!DOCTYPE html>

<html>
<head>
<title>Secret Message</title>
<style>
body{
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#surprise{
display:none;
}

img{
width:400px;
max-width:90%;
border-radius:15px;
}

.loading{
font-size:40px;
}

.bar{
width:300px;
height:20px;
border:2px solid white;
margin-top:20px;
}

.progress{
width:0%;
height:100%;
background:lime;
animation:load 5s linear forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
} </style>

</head>
<body>

<div id="loading">
    <div class="loading">Loading Secret Message...</div>
    <div class="bar">
        <div class="progress"></div>
    </div>
</div>

<div id="surprise">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Donkey_1_arp_750px.jpg">
    <h1>😂 GOTCHA! 😂</h1>
    <h2>You have been officially identified.</h2>
</div>

<script>
setTimeout(function(){
    document.getElementById("loading").style.display="none";
    document.getElementById("surprise").style.display="block";
},5000);
</script>

</body>
</html>
